name: 🚀 Feature request
description: Suggest an idea or improvement for Kurisu
title: "Feature | "
labels: ["enhancement"]

body:
  - type: markdown
    attributes:
      value: |
        ## 🚀 Feature Request
        Thanks for suggesting an idea! Please provide as much detail as possible

  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which part of Kurisu does this relate to?
      options:
        - Desktop Shell
        - AI Integration
        - MCP Protocol
        - Agent System
        - Configuration
        - Other
    validations:
      required: true

  - type: dropdown
    id: impact
    attributes:
      label: Impact
      description: How significant is this feature?
      options:
        - Critical
        - High
        - Medium
        - Low
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem / Motivation
      description: Describe the limitation, missing capability, or pain point
      placeholder: What problem are you trying to solve?
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should happen instead?

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe the solution you'd like to see

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any other approaches or workarounds you've considered?

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Screenshots, references, or extra details

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues, features/pull requests
          required: true
        - label: This is not a support question
          required: true