name: 🚀 Feature request
description: Suggest an idea or improvement for Kurisu
title: "Feature | "
labels: ["enhancement", "status:ready"]

body:
  - type: markdown
    attributes:
      value: |
        ## 🚀 Feature Request
        Thanks for suggesting an idea! Please provide as much detail as possible.

        For high-level efforts (release readiness, area roadmaps, external dependencies) use the **📋 Tracker** template instead.

  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which part of Kurisu does this relate to?
      options:
        - Desktop Shell
        - AI Integration
        - MCP Protocol
        - Agent System
        - Configuration
        - Core / Infrastructure
        - Build / CI
        - Tests
        - Documentation
        - Other
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      description: How important is this for the project?
      options:
        - high (Kurisu MUST have this feature)
        - medium (should ship in next releases)
        - low (nice to have)
    validations:
      required: true

  - type: dropdown
    id: audience
    attributes:
      label: Audience
      description: Who is this for?
      options:
        - developers
        - power users
        - end users (non-technical)
        - all
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem / Motivation
      description: Describe the limitation, missing capability, or pain point
      placeholder: What problem are you trying to solve?
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should happen instead?

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe the solution you'd like to see

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any other approaches or workarounds you've considered?

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Screenshots, references, or extra details

  - type: checkboxes
    id: checklist
    attributes:
      label: Pre-submit Checklist
      options:
        - label: I searched existing issues and pull requests
          required: true
        - label: This is not a support question (use Discussions)
          required: true
        - label: This is not a tracker-level effort (use 📋 Tracker instead)
          required: true
