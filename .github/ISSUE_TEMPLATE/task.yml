name: ✅ Task
description: Track a development task or implementation work
title: "Task | "
labels: ["task", "status:ready"]

body:
  - type: markdown
    attributes:
      value: |
        ## ✅ Development Task
        Use this template for a single piece of implementation work.
        For a large coordinated effort (release readiness, area roadmap, multi-package work) use the **📋 Tracker** template instead.

  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which part of Kurisu does this task relate to?
      options:
        - Desktop Shell
        - AI Integration
        - MCP Protocol
        - Agent System
        - Configuration
        - Core / Infrastructure
        - Build / CI
        - Tests
        - Documentation
        - Other
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      description: How urgent is this task?
      options:
        - high (critical for the release)
        - medium (should ship in next releases)
        - low (nice to have)
    validations:
      required: true

  - type: dropdown
    id: story_points
    attributes:
      label: Story Points
      description: Rough estimate (Fibonacci)
      options:
        - "1"
        - "2"
        - "3"
        - "5"
        - "8"
        - "13"
    validations:
      required: true

  - type: input
    id: tracker
    attributes:
      label: Tracker
      description: If this task is part of a higher-level tracker, link it here
      placeholder: Part of #N

  - type: textarea
    id: description
    attributes:
      label: Task Description
      description: What needs to be done?
      placeholder: Describe the task clearly...
    validations:
      required: true

  - type: textarea
    id: acceptance_criteria
    attributes:
      label: Acceptance Criteria
      description: How do we know this task is complete?
      value: |
        - [ ]
        - [ ]
        - [ ]
    validations:
      required: true

  - type: textarea
    id: implementation_notes
    attributes:
      label: Implementation Notes
      description: Technical approach, considerations, or constraints

  - type: textarea
    id: dependencies
    attributes:
      label: Dependencies
      description: Does this task depend on other issues or tasks?
      placeholder: "Related to #123, blocks #456"

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Screenshots, mockups, references, or extra details

  - type: checkboxes
    id: checklist
    attributes:
      label: Pre-task Checklist
      options:
        - label: I understand the requirements
          required: true
        - label: I have identified the affected components
          required: true
        - label: I have estimated the story points
          required: true
        - label: This task is small enough to be a single PR (use Tracker if not)
          required: true
