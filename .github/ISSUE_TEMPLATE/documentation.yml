name: 📚 Documentation
description: Suggest improvements or report issues in documentation
title: "Docs | "
labels: ["documentation"]

body:
  - type: markdown
    attributes:
      value: |
        ## 📚 Documentation Request
        Thanks for suggesting an improvement to our documentation!

  - type: dropdown
    id: type
    attributes:
      label: Type
      description: What kind of documentation issue is this?
      options:
        - Missing documentation
        - Incorrect information
        - Unclear explanation
        - Outdated content
        - Other
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: What is unclear or missing?
      description: Describe the issue with the current documentation
    validations:
      required: true

  - type: textarea
    id: suggestion
    attributes:
      label: Suggested improvement
      description: How can we improve it?

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Links, screenshots, or examples