name: 📚 Documentation
description: Suggest improvements or report issues in documentation
title: "Docs | "
labels: ["documentation", "status:ready"]

body:
  - type: markdown
    attributes:
      value: |
        ## 📚 Documentation Request
        Thanks for suggesting an improvement to our documentation!

  - type: dropdown
    id: component
    attributes:
      label: Affected documentation
      description: Which doc is affected?
      options:
        - README
        - Provider setup guide
        - Architecture overview
        - IPC contract reference
        - Hook authoring guide
        - Extension authoring guide
        - Permissions reference
        - CHANGELOG
        - Migration guide
        - FAQ
        - Code comments / XML doc
        - Other
    validations:
      required: true

  - type: dropdown
    id: type
    attributes:
      label: Type
      description: What kind of documentation issue is this?
      options:
        - Missing documentation
        - Incorrect information
        - Unclear explanation
        - Outdated content
        - Needs translation
        - Other
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      description: How urgent is this?
      options:
        - high (missmatches with current project state)
        - medium (should ship)
        - low (nice to have)
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: What is unclear or missing?
      description: Describe the issue with the current documentation
    validations:
      required: true

  - type: textarea
    id: suggestion
    attributes:
      label: Suggested improvement
      description: How can we improve it?

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Links, screenshots, or examples
